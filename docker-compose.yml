services:
  web:
    build: .
    volumes:
      - .:/app
      - media_files:/app/media    # ← AJOUTER cette ligne
    ports:
      - "8000:8000"
    stdin_open: true
    tty: true
    environment:
      - MONGO_URI=mongodb://mongo:27017/terroir_sn
    depends_on:
      - mongo

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
    depends_on:
      - mongo

volumes:
  mongo_data:
  media_files:    # ← AJOUTER cette ligne